spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS invest
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.datasource.stream.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS invest
spring.datasource.stream.driver-class-name=org.h2.Driver
spring.datasource.stream.username=sa
spring.datasource.stream.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=invest
spring.jpa.show-sql=false

spring.task.scheduling.enabled=false
spring.main.lazy-initialization=true

T_INVEST_TEST_TOKEN=test-token
TELEGRAM_BOT_TOKEN=test-bot-token
TELEGRAM_BOT_USERNAME=test-bot
TELEGRAM_LIMIT_CHANNEL_ID=test-channel
app.security.admin.username=test-admin
